anytown.wather.page:
  path: '/weather/{style}'
  defaults:
    _controller: '\Drupal\anytown\Controller\WeatherPage::build'
    _title: 'Weather at the market'
    style: 'short'
  requirements:
    _permission: 'view weekly_weather'


anytown.settings:
  path: '/amdin/config/system/anytown'
  defaults:
    _title: 'Anytown Settings'
    _form: 'Drupal\anytown\Form\SettingsForm'
  requirements:
    _permission: 'administer site configuration'


anytown.node_select_form:
  path: '/admin/config/anytown/node-select'
  defaults:
    _form: '\Drupal\anytown\Form\NodeSelectForm'
    _title: 'Select a node'
  requirements:
    _permission: 'administer site configuration'